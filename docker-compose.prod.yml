services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend-react
      - frontend-vue
      - frontend-svelte

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.prod
    expose:
      - "4000"
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data

  frontend-react:
    build:
      context: .
      dockerfile: frontend-react/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "80"

  frontend-vue:
    build:
      context: .
      dockerfile: frontend-vue/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "80"

  frontend-svelte:
    build:
      context: .
      dockerfile: frontend-svelte/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "80"

volumes:
  db_data:
  npm_data:
  npm_letsencrypt:
